name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch: # Permite ejecutar manualmente el workflow
        inputs:
            import_mtg_meta:
                description: 'Run MTGTop8 importer instead of deploying Pages'
                required: false
                default: 'false'
                type: choice
                options:
                    - 'false'
                    - 'true'
            import_mtg_market:
                description: 'Run MTGJSON market importer instead of deploying Pages'
                required: false
                default: 'false'
                type: choice
                options:
                    - 'false'
                    - 'true'
    schedule:
        # Weekly MTGTop8 refresh: Mondays at 08:17 UTC.
        - cron: '17 8 * * 1'

# Configurar permisos para GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Permitir solo un deployment concurrente
concurrency:
    group: 'pages'
    cancel-in-progress: false

jobs:
    import-mtg-data:
        if: github.event_name == 'schedule' || inputs.import_mtg_meta == 'true' || inputs.import_mtg_market == 'true'
        runs-on: ubuntu-latest
        env:
            INSFORGE_URL: ${{ secrets.INSFORGE_URL || secrets.VITE_INSFORGE_URL }}
            INSFORGE_API_KEY: ${{ secrets.INSFORGE_API_KEY || secrets.INSFORGE_SERVICE_ROLE_KEY }}
            MTGTOP8_META: '52'
            MTGTOP8_MAX_ARCHETYPES: '10'
            MTGTOP8_MAX_DECKS_PER_ARCHETYPE: '10'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Import MTGTop8 metagame decks
              if: github.event_name == 'schedule' || inputs.import_mtg_meta == 'true'
              run: pnpm run mtg:import-meta

            - name: Import MTGJSON market data
              if: github.event_name == 'schedule' || inputs.import_mtg_market == 'true'
              run: pnpm run mtg:import-market

    build:
        if: github.event_name != 'schedule' && inputs.import_mtg_meta != 'true' && inputs.import_mtg_market != 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Upload build artifacts
              uses: actions/upload-pages-artifact@v3
              with:
                  path: './dist'

    deploy:
        if: github.event_name != 'schedule' && inputs.import_mtg_meta != 'true' && inputs.import_mtg_market != 'true'
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
